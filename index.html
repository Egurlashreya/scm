<!-- Only changed input ids, label for, and radio values -->
<div class="form-panel">
  <h2>Registration Form</h2>

  <form>

    <div class="form-group">
      <input type="text" id="name" required placeholder=" " />
      <label for="name">Name</label>
    </div>

    <div class="form-group">
      <input type="text" id="father" required placeholder=" " />
      <label for="father">Father Name</label>
    </div>

    <div class="form-group">
      <input type="text" id="mother" required placeholder=" " />
      <label for="mother">Mother Name</label>
    </div>

    <div class="form-group">
      <input type="text" id="hallticket" required placeholder=" " />
      <label for="hallticket">Hall Ticket No</label>
    </div>

    <!-- GENDER FIELD -->
    <div class="form-group gender-field">
      <span class="gender-title">Gender</span>
      <div class="gender-group">
        <label><input type="radio" name="gender" value="male" required> Male</label>
        <label><input type="radio" name="gender" value="female" required> Female</label>
      </div>
    </div>

    <button class="submit-btn" type="submit">Submit</button>

  </form>
</div>
